name: 'Render Animation'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          npm install
          npx remotion browser ensure

      - name: Render video
        run: |
          mkdir -p out
          npx remotion render HypnicJerk out/hypnic_jerk_final.mp4 --no-sandbox
        env:
          REMOTION_ALLOW_EVAL: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: out/hypnic_jerk_final.mp4
