name: 'Render Animation'

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Node Deps
        run: npm install

      - name: Render Video
        run: |
          mkdir -p out
          npx remotion render src/index.ts HypnicJerk out/HypnicJerk_FINAL.mp4 --codec=h264
        env:
          REMOTION_ALLOW_EVAL: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: out/HypnicJerk_FINAL.mp4
          if-no-files-found: error
