name: 'Render Animation'

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Render video
        uses: remotion-dev/github-action@v1
        with:
          entry-point: src/index.ts
          composition-id: HypnicJerk
          output-location: out/hypnic_jerk_final.mp4
        env:
          REMOTION_ALLOW_EVAL: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: out/hypnic_jerk_final.mp4
