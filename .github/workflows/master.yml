name: 'Render Animation'

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Node Deps
        run: |
          npm install
          ls -la public/audio/segments/

      - name: Render Video
        run: |
          mkdir -p out
          npx remotion render --log=info HypnicJerk out/HypnicJerk_FULL.mp4 --concurrent-rendering=false
        env:
          REMOTION_ALLOW_EVAL: true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-video
          path: out/
          if-no-files-found: ignore
        continue-on-error: true

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: render-logs
          path: .remotion/
